<text x="22" y="92" font-size="10" fill="#8A847C" letter-spacing="1.5">CHAPTER 3 · MODERN · SCENE 3.3</text>
<text x="22" y="125" font-size="11" fill="#E5B948" letter-spacing="1.5">DID THE ARCHITECT SEE IT?</text>
<text x="22" y="165" font-size="22" font-weight="500" fill="#EDE6DA" font-family="Georgia,serif">Did Mengoni live to</text>
<text x="22" y="193" font-size="22" font-weight="500" fill="#EDE6DA" font-family="Georgia,serif">see his arcade open?</text>
<g transform="translate(22,225)">
<rect width="336" height="230" rx="14" fill="rgba(229,185,72,0.12)" stroke-width="0"/>
<rect width="3" height="230" fill="#E5B948"/>
<text x="20" y="32" font-size="11" font-weight="500" fill="#E5B948" letter-spacing="1">30 DECEMBER 1877</text>
<text x="20" y="60" font-size="13" fill="#EDE6DA" font-family="Georgia,serif">
<tspan x="20" dy="0">Two days before the</tspan>
<tspan x="20" dy="18">inauguration, Giuseppe</tspan>
<tspan x="20" dy="18">Mengoni fell from the</tspan>
<tspan x="20" dy="18">scaffolding of the</tspan>
<tspan x="20" dy="18">triumphal arch facing</tspan>
<tspan x="20" dy="18">the Duomo.</tspan>
<tspan x="20" dy="24" fill="#E5B948">He died on the spot.</tspan>
<tspan x="20" dy="18" fill="rgba(237,230,218,0.7)">Aged 47. Accident,</tspan>
<tspan x="20" dy="18" fill="rgba(237,230,218,0.7)">heart attack, or suicide</tspan>
<tspan x="20" dy="18" fill="rgba(237,230,218,0.7)">— never resolved.</tspan>
</text>
</g>
