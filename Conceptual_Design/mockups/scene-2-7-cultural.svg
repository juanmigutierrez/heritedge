<tspan x="20" dy="0">1574. Inside the Duomo workshop, a</tspan>
<tspan x="20" dy="16">Belgian glass-painter named Maestro</tspan>
<tspan x="20" dy="16">Valerio is finishing a window. He uses</tspan>
<tspan x="20" dy="16">saffron to colour the glass.</tspan>
<tspan x="20" dy="22" fill="#E5B948">At his daughter's wedding, he tells</tspan>
<tspan x="20" dy="16" fill="#E5B948">the cook to add a pinch to the rice.</tspan>
