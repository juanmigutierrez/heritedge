<tspan x="20" dy="0">Economic miracle at its peak.</tspan>
<tspan x="20" dy="18">You finish work near La Scala.</tspan>
<tspan x="20" dy="18">You walk into Bar Campari, ask</tspan>
<tspan x="20" dy="18">for a Negroni sbagliato. You stand</tspan>
<tspan x="20" dy="18">at the bar — never sit.</tspan>
<tspan x="20" dy="24" fill="#E5B948" font-style="italic">"La signora resta la più alta.</tspan>
<tspan x="20" dy="18" fill="#E5B948" font-style="italic">Sempre."</tspan>
